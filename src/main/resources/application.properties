server.port=8080
# URL for LM Studio or Ollama (if using OpenAI compatibility endpoint)
# LM Studio default: http://localhost:1234/v1
# Ollama default: http://localhost:11434/v1
llm.api.base-url=http://localhost:11434/v1
llm.api.key=not-needed
# Optional: used when the client sends "local-model" or omits the model field.
# Set this to an actual installed Ollama model name, for example llama3.2 or gemma3.
llm.api.default-model=
